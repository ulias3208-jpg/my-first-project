<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алина Безрученко — продвижение в соцсетях</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Анимированный фон с синими переливами */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-glow .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .bg-glow .blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #1a3a8a;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .bg-glow .blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: 50%;
            right: -5%;
            animation-delay: -3s;
            animation-duration: 10s;
        }

        .bg-glow .blob:nth-child(3) {
            width: 350px;
            height: 350px;
            background: #0ea5e9;
            bottom: -10%;
            left: 30%;
            animation-delay: -5s;
            animation-duration: 12s;
        }

        .bg-glow .blob:nth-child(4) {
            width: 300px;
            height: 300px;
            background: #7c3aed;
            top: 30%;
            left: 50%;
            animation-delay: -2s;
            animation-duration: 9s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 40px) scale(0.95); }
            75% { transform: translate(30px, 20px) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Главный блок: текст + фото */
        .hero {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 48px;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-text .tagline {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 18px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .hero-text .desc {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 1.4rem;
            line-height: 1.6;
            color: #d0d8f0;
            max-width: 440px;
            letter-spacing: 0.01em;
        }

        .hero-photo {
            flex-shrink: 0;
            width: 340px;
        }

        .hero-photo img {
            width: 100%;
            height: 440px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
        }

        /* Кнопки соцсетей */
        .socials {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 520px;
        }

        .socials a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 28px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .socials a::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .socials a:hover {
            transform: translateY(-2px);
            border-color: transparent;
        }

        /* Telegram */
        .socials a.tg {
            border-color: rgba(0, 212, 255, 0.4);
        }
        .socials a.tg::before {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 136, 255, 0.15));
        }
        .socials a.tg:hover {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.15);
        }
        .socials a.tg:hover::before { opacity: 1; }

        /* VK */
        .socials a.vk {
            border-color: rgba(80, 120, 255, 0.4);
        }
        .socials a.vk::before {
            background: linear-gradient(135deg, rgba(80, 120, 255, 0.2), rgba(60, 90, 220, 0.15));
        }
        .socials a.vk:hover {
            box-shadow: 0 0 25px rgba(80, 120, 255, 0.4), 0 0 60px rgba(80, 120, 255, 0.15);
        }
        .socials a.vk:hover::before { opacity: 1; }

        /* Нельзяграм */
        .socials a.ig {
            border-color: rgba(225, 48, 108, 0.4);
        }
        .socials a.ig::before {
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.2), rgba(168, 85, 247, 0.15));
        }
        .socials a.ig:hover {
            box-shadow: 0 0 25px rgba(225, 48, 108, 0.4), 0 0 60px rgba(168, 85, 247, 0.15);
        }
        .socials a.ig:hover::before { opacity: 1; }

        /* Иконки SVG */
        .icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .socials a span {
            position: relative;
            z-index: 1;
        }

        .label-sub {
            font-size: 0.82rem;
            font-weight: 400;
            color: #8892b0;
            display: block;
            margin-top: 2px;
        }

        /* Мобильная адаптация */
        @media (max-width: 700px) {
            .hero {
                flex-direction: column-reverse;
                gap: 28px;
                text-align: center;
            }

            .hero-photo {
                width: 260px;
            }

            .hero-photo img {
                height: 340px;
            }

            .hero-text h1 {
                font-size: 2.4rem;
            }

            .hero-text .desc {
                margin: 0 auto;
            }

            .socials {
                width: 100%;
                max-width: 100%;
            }

            .container {
                padding: 40px 16px;
            }

            .socials a {
                padding: 16px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
